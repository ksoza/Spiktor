# aios-kernel/litellm_config.yml
# LiteLLM proxy config for Spiktor
# Mounts into the litellm container at /app/config.yaml
#
# Strategy:
#   spiktor-planner, spiktor-judge → claude-opus-4-6  (real Claude, high stakes)
#   spiktor-coder, spiktor-critic  → qwen2.5-coder-32b via ollama (free, locally hosted)
#   spiktor-ops                    → claude-sonnet-4-6 (reliable for deploy commands)
#   ghostface intel                → claude-haiku-4-5  (cheap, high-volume)
#
# Cost saving: coder + critic handle the highest token volume in the pipeline.
# Routing them to a local qwen2.5-coder (free after hardware cost) stops
# burning Anthropic tokens on the majority of AIOS operations.

model_list:
  # Claude — high-stakes reasoning
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Local via Ollama — free after hardware
  - model_name: ollama/qwen2.5-coder:32b
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://ollama:11434

  - model_name: ollama/qwen2.5-coder:14b
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://ollama:11434

  # Fallback model if local ollama is down
  - model_name: ollama/llama3.1:8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434

router_settings:
  routing_strategy: latency-based-routing
  fallbacks:
    - ollama/qwen2.5-coder:32b: [claude-sonnet-4-6]  # if ollama down, fall back to Claude

litellm_settings:
  success_callback: []
  failure_callback: []
  cache: true
  cache_params:
    type: local
    ttl: 3600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null  # no DB required for basic routing
